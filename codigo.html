<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Web Completa</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f4f8;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            text-align: center;
            padding: 45px 20px;
        }

        header h1 {
            margin: 0;
            font-size: 38px;
        }

        header p {
            font-size: 18px;
            margin-top: 10px;
        }

        nav {
            background-color: #172554;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            margin: 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        .contenedor {
            width: 85%;
            margin: 30px auto;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.15);
        }

        .seccion-principal {
            text-align: center;
            padding: 20px;
        }

        .seccion-principal h2 {
           color: #1e3a8a;
           font-size: 30px;
        }


        .seccion-principal p {
           font-size: 17px;
           line-height: 1.6;
        }

        .boton {
           display: inline-block;
           background-color: #1e3a8a;
           color: white;
           padding: 13px 25px;
           text-decoration: none;
           border-radius: 8px;
           margin-top: 15px;
           font-weight: bold;
        }

        .boton:hover {
           background-color: #0f256e;
        }

        .tarjetas {
           display: flex;
           gap: 20px;
           margin-top: 30px;
           flex-wrap: wrap;
           justify-content: center;
        }

        .tarjeta {
           background-color: #e0ecff;
           width: 280px;
           padding: 22px;
           border-radius: 10px;
           text-align: center;
           box-shadow: 0 0 8px rgba(0, 0, 0, 0.12);
        }

        .tarjeta h3 {
           color: #1e3a8a;
        }

        .tarjeta p {
           line-height: 1.5;
        }

        .servicios {
           margin-top: 40px;
        }

        .servicios h2 {
           color: #1e3a8a;
           text-align: center;
        }

        .lista-servicios {
            background-color: #f8fafc;
            padding: 20px;
            border-radius: 10px;
        }

        .lista-servicios ul {
            font-size: 17px;
            line-height: 1.8;
        }

        .tabla-info {
            margin-top: 40px;
        }
 
        .tabla-info h2 {
            color: #1e3a8a;
            text-align: center;
       }

         table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
       }

         th {
            background-color: #1e3a8a;
            color: white;
            padding: 12px;
       }

         td {
             border: 1px solid #ccc;
             padding: 12px;
             text-align: center;
       }

        tr:nth-child(even) {
             background-color: #f1f5f9;
       }

        .contacto {
              margin-top: 40px;
       }

        .contacto h2 {
              color: #1e3a8a;
              text-align: center;
       }

        form {
             background-color: #f8fafc;
             padding: 25px;
             border-radius: 10px;
       }

        .campo {
             margin-bottom: 15px;
       }

        .campo label {
             display: block;
             font-weight: bold;
             margin-bottom: 6px;
       }

        .campo input,
        .campo textarea {
             width: 100%;
             padding: 11px;
             border: 1px solid #bbb;
       }
</style>
</head>
</html>
